  <script>
    (function () {
      const downloadButton = document.getElementById("download-svg-button");
      const canvas = document.querySelector(".canvas");
      if (!downloadButton || !canvas) {
        return;

      downloadButton.addEventListener("click", function () {

        const serializer = new XMLSerializer();

          svgSource = svgSource.replace("<svg", '<svg xmlns="http://www.w3.org/2000/svg"');

        if (!svgSource.includes("xmlns:xlink=")) {
          svgSource = svgSource.replace("<svg", '<svg xmlns:xlink="http://www.w3.org/1999/xlink"');

        const blobUrl = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = blobUrl;
        link.download = "diagram-3f0b4d6e-5d32-4acf-9ada-7eddd242eac7.svg";
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
